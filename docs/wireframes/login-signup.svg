<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Login and signup wireframes</title>
<desc>Two low-fidelity wireframes: a login screen and a signup screen, each with email/password fields and a Continue with Google button.</desc>

<rect width="700" height="480" fill="#ffffff"/>

<!-- Login screen -->
<text x="40" y="30" font-family="Arial" font-size="13" fill="#666">Login — /login</text>
<rect x="40" y="45" width="290" height="410" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
<rect x="165" y="70" width="40" height="40" rx="6" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

<text x="65" y="140" font-family="Arial" font-size="12" fill="#666">Email</text>
<rect x="65" y="148" width="240" height="34" rx="4" fill="#ffffff" stroke="#bbb"/>
<text x="75" y="169" font-family="Arial" font-size="12" fill="#aaa">name@example.com</text>

<text x="65" y="205" font-family="Arial" font-size="12" fill="#666">Password</text>
<rect x="65" y="213" width="240" height="34" rx="4" fill="#ffffff" stroke="#bbb"/>
<text x="75" y="234" font-family="Arial" font-size="12" fill="#aaa">••••••••</text>

<rect x="65" y="262" width="240" height="38" rx="4" fill="#222"/>
<text x="185" y="286" font-family="Arial" font-size="13" fill="#fff" text-anchor="middle">Log in</text>

<text x="185" y="322" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">or</text>

<rect x="65" y="335" width="240" height="38" rx="4" fill="#ffffff" stroke="#bbb"/>
<text x="185" y="359" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Continue with Google</text>

<text x="185" y="405" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">No account? Sign up</text>

<!-- Signup screen -->
<text x="370" y="30" font-family="Arial" font-size="13" fill="#666">Signup — /signup</text>
<rect x="370" y="45" width="290" height="410" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
<rect x="495" y="65" width="40" height="40" rx="6" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

<text x="395" y="132" font-family="Arial" font-size="12" fill="#666">Name</text>
<rect x="395" y="140" width="240" height="32" rx="4" fill="#ffffff" stroke="#bbb"/>
<text x="405" y="160" font-family="Arial" font-size="12" fill="#aaa">Shreya Rao</text>

<text x="395" y="192" font-family="Arial" font-size="12" fill="#666">Email</text>
<rect x="395" y="200" width="240" height="32" rx="4" fill="#ffffff" stroke="#bbb"/>
<text x="405" y="220" font-family="Arial" font-size="12" fill="#aaa">name@example.com</text>

<text x="395" y="252" font-family="Arial" font-size="12" fill="#666">Password</text>
<rect x="395" y="260" width="240" height="32" rx="4" fill="#ffffff" stroke="#bbb"/>
<text x="405" y="280" font-family="Arial" font-size="12" fill="#aaa">min 8 characters</text>

<rect x="395" y="305" width="240" height="38" rx="4" fill="#222"/>
<text x="515" y="329" font-family="Arial" font-size="13" fill="#fff" text-anchor="middle">Create account</text>

<text x="515" y="365" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">or</text>

<rect x="395" y="378" width="240" height="38" rx="4" fill="#ffffff" stroke="#bbb"/>
<text x="515" y="402" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Continue with Google</text>

<text x="515" y="440" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">Have an account? Log in</text>

</svg>
